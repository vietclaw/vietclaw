name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build embedded web UI
        working-directory: apps/web
        run: pnpm build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o dist/vietclaw-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/vietclaw

      - uses: actions/upload-artifact@v4
        with:
          name: vietclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/vietclaw-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

